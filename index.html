<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Large File Upload</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 450px; margin: auto; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        #status { margin-top: 15px; font-weight: bold; font-size: 14px; }
        .success { color: green; }
        .error { color: red; }
        #progressBarContainer { width: 100%; background: #eee; border-radius: 5px; display: none; margin: 10px 0; }
        #progressBar { height: 20px; width: 0%; background: #4CAF50; border-radius: 5px; color: white; text-align: center; font-size: 12px; line-height: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <div id="loginSection">
            <h3>Login Required</h3>
            <input type="password" id="passwordInput" placeholder="Enter Access Code">
            <button onclick="checkLogin()" style="background: #2196F3; color: white; border: none;">Login</button>
            <div id="loginError" class="error"></div>
        </div>

        <div id="uploadSection" style="display: none;">
            <h3>Upload File (>100MB)</h3>
            <form id="uploadForm">
                <input type="file" id="fileInput" required>
                <button type="submit" id="submitBtn" style="background: #4CAF50; color: white; border: none;">Start Upload</button>
            </form>
            <div id="progressBarContainer"><div id="progressBar">0%</div></div>
            <div id="status"></div>
            <hr>
            <button onclick="logout()" style="background: #eee; border: none; font-size: 12px;">Logout</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbye3N8PuF85659CNE8mmt_VLhgk6Ld8E4Hh9356dOqEwj4qpP5Hk09FQDsjGGtV-ZU_/exec";
        let userPassword = "";

        function checkLogin() {
            const pass = document.getElementById('passwordInput').value;
            if (pass) {
                userPassword = pass; // Store temporarily
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
            }
        }

        function logout() { location.reload(); }

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const file = document.getElementById('fileInput').files[0];
            const statusDiv = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            const progBar = document.getElementById('progressBar');
            const progCont = document.getElementById('progressBarContainer');

            statusDiv.innerText = "Authenticating...";
            submitBtn.disabled = true;

            try {
                // 1. Get Resumable URL + Validate Password
                const initResp = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: "getUploadUrl",
                        password: userPassword,
                        filename: file.name,
                        mimeType: file.type || 'application/octet-stream'
                    })
                });
                // ... inside your event listener ..
                const initData = await initResp.json();
               // ADD THIS CHECK:
                if (initData.status !== 'success' || !initData.uploadUrl) {
                    throw new Error(initData.message || "Could not retrieve Upload URL from Google.");
                }
                
                const uploadUrl = initData.uploadUrl;
                // ... now the XHR will have a real URL ...
                // 2. Upload Direct to Google
                progCont.style.display = "block";
                const xhr = new XMLHttpRequest();
                xhr.open("PUT", initData.uploadUrl, true);

                xhr.upload.onprogress = (ev) => {
                    const percent = Math.round((ev.loaded / ev.total) * 100);
                    progBar.style.width = percent + "%";
                    progBar.innerText = percent + "%";
                };

                xhr.onload = () => {
                    submitBtn.disabled = false;
                    if (xhr.status === 200 || xhr.status === 201) {
                        statusDiv.className = "success";
                        statusDiv.innerText = "Upload Complete!";
                    } else {
                        throw new Error("Upload failed on Google side.");
                    }
                };

                xhr.send(file);

            } catch (err) {
                submitBtn.disabled = false;
                statusDiv.className = "error";
                statusDiv.innerText = err.message;
                if (err.message.includes("Unauthorized")) logout();
            }
        });
    </script>
</body>
</html>
